    <style>

<body>
<div class="app-container">
    <div class="mode-bar">
        <button id="kidModeBtn" class="mode-btn active">🧑‍🎤 Kid Zone</button>
        <button id="parentModeBtn" class="mode-btn">👩‍💻 Parent Portal</button>
    </div>
    <!-- KID SECTION -->
    <div id="kidSection" class="card">
        <div class="kid-header">
            <div class="kid-selector" id="kidSelector">
                <div data-child="child_umar" class="kid-avatar">🧑 Umar · 14</div>
                <div data-child="child_muaz" class="kid-avatar">👩 Muaz · 13</div>
            </div>
            <div class="balance-card">
                🎮 Screen balance<br>
                <span id="balanceMinutes" class="balance-minutes">0</span> <span style="font-size:1rem;">min</span>
            </div>
        </div>
        <div id="liveTimerDisplay" class="timer-alert">⏳ No active session</div>
        <div class="redeem-buttons">
            <button class="redeem-btn" data-minutes="15">⚡ 15 min</button>
            <button class="redeem-btn" data-minutes="30">🎯 30 min</button>

        </div>
        <div class="study-form">
            <h3 style="margin-bottom: 12px;">📚 Request study time + proof</h3>
            <input type="text" id="studySubject" placeholder="Subject (e.g. Math, Science)">
            <textarea id="studyDesc" rows="2" placeholder="What did you study?"></textarea>
            <input type="file" id="proofFile" accept="image/*,video/*" capture="environment">
            <button id="submitStudyBtn">✨ Submit for approval</button>
            <div id="uploadStatus" style="margin-top: 12px; font-size:0.85rem; color:#475569;"></div>
        </div>
    </div>

    <!-- PARENT SECTION (hidden) -->
    <div id="parentSection" class="card" style="display:none;">
        <div id="parentAuthPanel">
            <h3>🔐 Parent access</h3>
            <input type="email" id="parentEmail" placeholder="Email" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #e2e8f0;">
            <input type="password" id="parentPassword" placeholder="Password" style="width:100%; margin:8px 0; padding:12px; border-radius:40px; border:1px solid #e2e8f0;">
            <button id="parentSigninBtn" style="background:#0f172a; color:white;">Sign in</button>
            <button id="parentSignoutBtn" class="signout-btn" style="display:none;">Sign out</button>
            <div id="authMsg"></div>
        </div>
        <div id="parentDashboardContent" style="display:none;">
            <div class="parent-tabs">
                <button class="tab-btn active" data-tab="approvals">📋 Pending</button>
                <button class="tab-btn" data-tab="admin">⚙️ Adjust balance</button>
                <button class="tab-btn" data-tab="audit">📜 Audit log</button>
                <button class="tab-btn" data-tab="chart">📊 Weekly chart</button>
            </div>
            <div id="approvalsTab"></div>
            <div id="adminTab" style="display:none;">
                <h4>➕ Manual adjustment</h4>
                <select id="manualChildSelect"><option value="child_umar">Umar</option><option value="child_muaz">Muaz</option></select>
                <input type="number" id="manualMinutes" placeholder="Minutes (+ add / - subtract)" value="30">
                <button id="applyManualAdjust">Apply</button>
                <hr style="margin:20px 0;">
                <div id="childBalancesList"></div>
            </div>
            <div id="auditTab" style="display:none;"><div id="auditLogList"></div></div>
            <div id="chartTab" style="display:none;"><canvas id="weeklyChart"></canvas></div>
        </div>
    </div>
</div>

<script type="module">
    // ---------- FIREBASE IMPORTS ----------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, where, onSnapshot, orderBy, limit, runTransaction, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const app = initializeApp(window.FIREBASE_CONFIG);
    const db = getFirestore(app);
    const auth = getAuth(app);
    enableIndexedDbPersistence(db).catch(e => console.warn("offline persistence:", e));

    // ---------- GLOBALS ----------
    let currentChildId = "child_umar";
    let currentTimerInterval = null;
    let timerWarningTriggered = false;
    let childBalanceUnsub = null;
    let pendingSubmissionsUnsub = null;
    let parentAuthenticated = false;
    let weeklyChartInstance = null;

    // Ensure children exist
    async function ensureChildrenExist() {
        for (const id of ["child_umar", "child_muaz"]) {
            const ref = doc(db, "children", id);
            const snap = await getDoc(ref);
            if (!snap.exists()) await setDoc(ref, { name: id === "child_umar" ? "Umar" : "Muaz", balanceMinutes: 0, createdAt: new Date() });
        }
    }
    ensureChildrenExist();

    function subscribeChildBalance(childId) {
        if (childBalanceUnsub) childBalanceUnsub();
        childBalanceUnsub = onSnapshot(doc(db, "children", childId), (docSnap) => {
            document.getElementById("balanceMinutes").innerText = docSnap.exists() ? docSnap.data().balanceMinutes : 0;
        });
    }

    // Timer with localStorage
    function manageActiveTimer() {
        if (currentTimerInterval) clearInterval(currentTimerInterval);
        const storageKey = `screen_timer_end_${currentChildId}`;
        const timerDiv = document.getElementById("liveTimerDisplay");
        function updateDisplay() {
            const end = localStorage.getItem(storageKey);
            if (!end || parseInt(end) <= Date.now()) {
                localStorage.removeItem(storageKey);
                timerDiv.innerHTML = "⏳ No active screen session";
                if (currentTimerInterval) clearInterval(currentTimerInterval);
                currentTimerInterval = null;
                timerWarningTriggered = false;
                return;
            }
            const remainingMs = parseInt(end) - Date.now();
            const min = Math.floor(remainingMs / 60000);
            const sec = Math.floor((remainingMs % 60000) / 1000);
            timerDiv.innerHTML = `🎮 SCREEN TIME ACTIVE: ${min}m ${sec}s left`;
            if (remainingMs <= 300000 && !timerWarningTriggered) {
                timerWarningTriggered = true;
                timerDiv.style.background = "#ffedd5";
                timerDiv.innerHTML += " ⚠️ 5 minutes left!";
            }
        }
        updateDisplay();
        currentTimerInterval = setInterval(updateDisplay, 1000);
    }

    async function redeemMinutes(minutes) {
        const existingEnd = localStorage.getItem(`screen_timer_end_${currentChildId}`);
        if (existingEnd && parseInt(existingEnd) > Date.now()) return alert("⏰ You already have an active timer!");
        const childRef = doc(db, "children", currentChildId);
        try {
            await runTransaction(db, async (transaction) => {
                const snap = await transaction.get(childRef);
                const balance = snap.data()?.balanceMinutes || 0;
                if (balance < minutes) throw new Error(`Insufficient balance (${balance} min left)`);
                transaction.update(childRef, { balanceMinutes: balance - minutes });
                await transaction.set(doc(collection(db, "redemptions")), { childId: currentChildId, minutes, createdAt: new Date(), type: "redemption" });
            });
            localStorage.setItem(`screen_timer_end_${currentChildId}`, (Date.now() + minutes * 60000).toString());
            timerWarningTriggered = false;
            manageActiveTimer();
            alert(`✅ ${minutes} minutes redeemed! Timer started.`);
        } catch (err) { alert(err.message); }
    }

    // ----- CLOUDINARY UPLOAD (No CORS issues) -----
    const CLOUDINARY_CLOUD_NAME = "YOUR_CLOUD_NAME"; // 👈 Paste your Cloud name
    const CLOUDINARY_UPLOAD_PRESET = "screen_time_uploads"; // 👈 Your preset name

    async function resizeImageToBlob(file, maxWidth = 800, quality = 0.8) {
        if (!file.type.startsWith('image/')) return file;
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    async function uploadToCloudinary(fileBlob) {
        const formData = new FormData();
        formData.append("file", fileBlob);
        formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
        
        const response = await fetch(
            `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
            { method: "POST", body: formData }
        );
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error?.message || "Cloudinary upload failed");
        }
        const data = await response.json();
        return data.secure_url; // Direct image URL (works anywhere)
    }

    // Replace the submitStudyRequest function's upload part:
    async function submitStudyRequest() {
        // ... same validation code ...
        try {
            const resized = await resizeImageToBlob(file);
            const imageUrl = await uploadToCloudinary(resized); // 👈 now uses Cloudinary
            // ... rest same, save imageUrl to Firestore ...
        } catch(err) { /* handle error */ }
    }

    async function submitStudyRequest() {
        const subject = document.getElementById("studySubject").value.trim();
        const description = document.getElementById("studyDesc").value.trim();
        const fileInput = document.getElementById("proofFile");
        const statusDiv = document.getElementById("uploadStatus");
        if (!subject) return alert("Enter a subject");
        if (!fileInput.files.length) return alert("Select a photo/video");
        let file = fileInput.files[0];
        if (file.size > 2 * 1024 * 1024) return alert("Max 2MB");
        statusDiv.innerText = "📤 Resizing & uploading to Cloudinary...";
        try {
            const resized = await resizeImageToBlob(file);
            const imageUrl = await uploadToCloudinary(resized);
            await addDoc(collection(db, "submissions"), {
                childId: currentChildId, subject, description, photoURL: imageUrl, status: "pending",
                earnedMinutes: 0, createdAt: new Date(), approvedAt: null, approvedBy: null
            });
            statusDiv.innerHTML = "✅ Submitted! Waiting for parent approval.";
            document.getElementById("studySubject").value = "";
            document.getElementById("studyDesc").value = "";
            fileInput.value = "";
        } catch (err) {
            statusDiv.innerHTML = "❌ Upload error: " + err.message;
        }
    }

    // ---------- PARENT FUNCTIONS ----------
    async function loadPendingApprovals() {
        if (pendingSubmissionsUnsub) pendingSubmissionsUnsub();
        const q = query(collection(db, "submissions"), where("status", "==", "pending"), orderBy("createdAt", "desc"));
        pendingSubmissionsUnsub = onSnapshot(q, (snap) => {
            const container = document.getElementById("approvalsTab");
            if (!container) return;
            if (snap.empty) { container.innerHTML = "<p>✨ No pending submissions</p>"; return; }
            let html = "";
            snap.forEach(docSnap => {
                const data = docSnap.data();
                const id = docSnap.id;
                html += `
                    <div class="submission-card">
                        <img src="${data.photoURL}" class="submission-thumb" alt="proof" onerror="this.src='https://placehold.co/80x80'">
                        <div><strong>${data.subject}</strong><br>${data.description || ""}<br><small>👤 ${data.childId === "child_umar" ? "Umar" : "Muaz"}</small></div>
                        <div>🎓 Earn: <input type="range" id="slider_${id}" min="5" max="60" value="20" step="5"> <span id="val_${id}">20</span> min</div>
                        <div class="admin-controls">
                            <button class="approveBtn" data-id="${id}" data-child="${data.childId}">✅ Approve</button>
                            <button class="rejectBtn" data-id="${id}">❌ Reject</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
            snap.forEach(docSnap => {
                const id = docSnap.id;
                const slider = document.getElementById(`slider_${id}`);
                if(slider) slider.oninput = (e) => document.getElementById(`val_${id}`).innerText = e.target.value;
                document.querySelector(`.approveBtn[data-id="${id}"]`).onclick = () => approveSubmission(id);
                document.querySelector(`.rejectBtn[data-id="${id}"]`).onclick = () => rejectSubmission(id);
            });
        });
    }

    async function approveSubmission(id) {
        const slider = document.getElementById(`slider_${id}`);
        const earned = parseInt(slider?.value || 20);
        const subRef = doc(db, "submissions", id);
        const subSnap = await getDoc(subRef);
        if (!subSnap.exists()) return;
        const childId = subSnap.data().childId;
        const childRef = doc(db, "children", childId);
        await runTransaction(db, async (tr) => {
            const child = await tr.get(childRef);
            const newBalance = (child.data()?.balanceMinutes || 0) + earned;
            tr.update(childRef, { balanceMinutes: newBalance });
            tr.update(subRef, { status: "approved", earnedMinutes: earned, approvedAt: new Date(), approvedBy: auth.currentUser?.uid });
        });
        alert(`Approved! Added ${earned} minutes.`);
    }

    async function rejectSubmission(id) {
        await updateDoc(doc(db, "submissions", id), { status: "rejected" });
        alert("Rejected.");
    }

    async function manualAdjust(childId, delta) {
        const childRef = doc(db, "children", childId);
        await runTransaction(db, async (tr) => {
            const snap = await tr.get(childRef);
            const newBal = (snap.data()?.balanceMinutes || 0) + delta;
            if (newBal < 0) throw new Error("Balance can't go negative");
            tr.update(childRef, { balanceMinutes: newBal });
            await tr.set(doc(collection(db, "redemptions")), { childId, minutes: delta, type: "manual_adjust", createdAt: new Date(), note: "Parent adjusted" });
        });
        alert(`Balance updated (${delta > 0 ? '+' : ''}${delta} min)`);
        refreshChildBalances();
    }

    async function loadAuditLog() {
        const submissions = await getDocs(query(collection(db, "submissions"), where("status", "in", ["approved","rejected"]), orderBy("createdAt", "desc"), limit(30)));
        const redemptions = await getDocs(query(collection(db, "redemptions"), orderBy("createdAt", "desc"), limit(40)));
        let items = [];
        submissions.forEach(d => { const data = d.data(); items.push({ time: data.createdAt?.toDate(), text: `${data.childId === "child_umar" ? "Umar" : "Muaz"} | Study ${data.status} | ${data.earnedMinutes || 0} min` }); });
        redemptions.forEach(d => { const data = d.data(); items.push({ time: data.createdAt?.toDate(), text: `${data.childId === "child_umar" ? "Umar" : "Muaz"} | ${data.type === "manual_adjust" ? "Manual" : "Redeemed"} | ${data.minutes} min` }); });
        items.sort((a,b) => b.time - a.time);
        document.getElementById("auditLogList").innerHTML = items.slice(0,50).map(i => `<div class="audit-item">📅 ${i.time.toLocaleString()} · ${i.text}</div>`).join("");
    }

    async function loadWeeklyChart() {
        const weekAgo = new Date(Date.now() - 7*86400000);
        const approved = await getDocs(query(collection(db, "submissions"), where("status", "==", "approved"), where("createdAt", ">=", weekAgo)));
        let study = 0; approved.forEach(d => study += d.data().earnedMinutes || 0);
        const redemptions = await getDocs(query(collection(db, "redemptions"), where("type", "==", "redemption"), where("createdAt", ">=", weekAgo)));
        let screen = 0; redemptions.forEach(r => screen += r.data().minutes || 0);
        const ctx = document.getElementById('weeklyChart').getContext('2d');
        if (weeklyChartInstance) weeklyChartInstance.destroy();
        weeklyChartInstance = new Chart(ctx, {
            type: 'bar', data: { labels: ['Study 📚', 'Screen 🎮'], datasets: [{ label: 'Last 7 days (minutes)', data: [study, screen], backgroundColor: ['#3b82f6', '#f97316'] }] },
            options: { responsive: true, maintainAspectRatio: true }
        });
    }

    async function refreshChildBalances() {
        const umar = await getDoc(doc(db,"children","child_umar"));
        const muaz = await getDoc(doc(db,"children","child_muaz"));
        document.getElementById("childBalancesList").innerHTML = `<p>🧑 Umar: ${umar.data()?.balanceMinutes || 0} min &nbsp; 👩 Muaz: ${muaz.data()?.balanceMinutes || 0} min</p>`;
    }

    // Helper getDocs for queries
    async function getDocs(querySnap) { const snap = await querySnap; return snap; }

    // ---------- AUTH & UI SWITCHING ----------
    function showParentContent(show) {
        document.getElementById("parentAuthPanel").style.display = show ? "none" : "block";
        document.getElementById("parentDashboardContent").style.display = show ? "block" : "none";
        if (show) { loadPendingApprovals(); refreshChildBalances(); loadAuditLog(); loadWeeklyChart(); }
        else if (pendingSubmissionsUnsub) { pendingSubmissionsUnsub(); pendingSubmissionsUnsub = null; }
    }

    onAuthStateChanged(auth, (user) => {
        parentAuthenticated = !!user;
        if (parentAuthenticated && document.getElementById("parentSection").style.display !== "none") showParentContent(true);
        else if (!parentAuthenticated && document.getElementById("parentSection").style.display !== "none") showParentContent(false);
        document.getElementById("parentSigninBtn").style.display = parentAuthenticated ? "none" : "inline-block";
        document.getElementById("parentSignoutBtn").style.display = parentAuthenticated ? "inline-block" : "none";
        document.getElementById("authMsg").innerText = parentAuthenticated ? `Logged in as ${user.email}` : "";
    });

    document.getElementById("parentSigninBtn").onclick = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById("parentEmail").value, document.getElementById("parentPassword").value); }
        catch(e) { alert("Login failed: " + e.message); }
    };
    document.getElementById("parentSignoutBtn").onclick = async () => { await signOut(auth); location.reload(); };

    // Mode toggles
    document.getElementById("kidModeBtn").onclick = () => {
        document.getElementById("kidModeBtn").classList.add("active");
        document.getElementById("parentModeBtn").classList.remove("active");
        document.getElementById("kidSection").style.display = "block";
        document.getElementById("parentSection").style.display = "none";
        subscribeChildBalance(currentChildId);
        manageActiveTimer();
    };
    document.getElementById("parentModeBtn").onclick = () => {
        document.getElementById("parentModeBtn").classList.add("active");
        document.getElementById("kidModeBtn").classList.remove("active");
        document.getElementById("kidSection").style.display = "none";
        document.getElementById("parentSection").style.display = "block";
        if (parentAuthenticated) showParentContent(true);
        else showParentContent(false);
    };

    // Kid UI listeners
    document.querySelectorAll(".kid-avatar").forEach(el => {
        el.onclick = () => {
            document.querySelectorAll(".kid-avatar").forEach(c=>c.classList.remove("selected"));
            el.classList.add("selected");
            currentChildId = el.getAttribute("data-child");
            subscribeChildBalance(currentChildId);
            manageActiveTimer();
        };
    });
    document.querySelectorAll(".redeem-btn").forEach(btn => btn.onclick = () => redeemMinutes(parseInt(btn.getAttribute("data-minutes"))));
    document.getElementById("submitStudyBtn").onclick = submitStudyRequest;
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            const tab = btn.getAttribute("data-tab");
            document.getElementById("approvalsTab").style.display = tab === "approvals" ? "block" : "none";
            document.getElementById("adminTab").style.display = tab === "admin" ? "block" : "none";
            document.getElementById("auditTab").style.display = tab === "audit" ? "block" : "none";
            document.getElementById("chartTab").style.display = tab === "chart" ? "block" : "none";
            if (tab === "audit") loadAuditLog();
            if (tab === "chart") loadWeeklyChart();
            if (tab === "admin") refreshChildBalances();
        };
    });
    document.getElementById("applyManualAdjust").onclick = () => {
        const child = document.getElementById("manualChildSelect").value;
        const mins = parseInt(document.getElementById("manualMinutes").value);
        if (!isNaN(mins)) manualAdjust(child, mins);
    };
    // init kid mode default
    document.querySelector(".kid-avatar").classList.add("selected");
    subscribeChildBalance(currentChildId);
    manageActiveTimer();
</script>
</body>
</html>
